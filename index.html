      return { totalGamesPlayed:0,totalQuestionsSeen:0,totalCorrect:0,totalWrong:0,bestStreak:0,highestEndlessScore:0,dailyStreak:0,bestDailyStreak:0,lastDailyDate:'',perfectRounds:0,levelUnlocked:1,totalScore:0,answeredQuestionIds:[],missedQuestionIds:[],categoryStats:{},modeStats:{},dailyHistory:{},unlockedModes:{mixed:false,almost:false},recentQuestionIds:[],playerSeed:createPlayerSeed(),modeQueues:{} };
    }
    function loadStats() { try { return {...defaultStats(), ...(JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'))}; } catch { return defaultStats(); } }
    function saveStats() { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); }

    // Seeded random / shuffle helpers
    function createPlayerSeed() { if (window.crypto && crypto.getRandomValues) { const a = new Uint32Array(1); crypto.getRandomValues(a); return a[0]; } return Math.floor(Math.random()*2**32); }
    function hashString(text) { let h = 2166136261; for (const ch of text) h = Math.imul(h ^ ch.charCodeAt(0), 16777619) >>> 0; return h; }
    function seededRandom(seed) { let t = seed >>> 0; return () => { t += 0x6D2B79F5; let r = Math.imul(t ^ (t >>> 15), 1 | t); r ^= r + Math.imul(r ^ (r >>> 7), 61 | r); return ((r ^ (r >>> 14)) >>> 0) / 4294967296; }; }
    function shuffleArray(items, seed) { const rand = seed === undefined ? Math.random : seededRandom(seed); const out = [...items]; for (let i=out.length-1;i>0;i--) { const j = Math.floor(rand()*(i+1)); [out[i],out[j]]=[out[j],out[i]]; } return out; }
    function todayKey() { return new Date().toLocaleDateString('en-CA'); }

    // Question selection
    function getEligibleQuestions(mode, level) {
      let pool = QUESTION_BANK.filter(q => !level || q.level === level);
      if (mode === 'mixed') pool = pool.filter(q => q.level <= stats.levelUnlocked);
      if (mode === 'almost') pool = pool.filter(q => q.answer === 'ALMOST' && q.level <= stats.levelUnlocked);
      return pool;
    }
    function queueKey(mode, level) { return `${mode}${level ? '-' + level : ''}`; }
    function buildQueue(key, questions) {
      const recent = new Set(stats.recentQuestionIds);
      let pool = questions.filter(q => !recent.has(q.id));
      if (pool.length < Math.min(12, questions.length)) pool = questions;
      stats.modeQueues[key] = shuffleArray(pool.map(q => q.id), hashString(`${key}-${stats.playerSeed}-${Date.now()}`));
      saveStats();
    }
    function getNextQuestion(mode, level, usedIds = new Set()) {
      const eligible = getEligibleQuestions(mode, level).filter(q => !usedIds.has(q.id));
      const key = queueKey(mode, level);
      if (!stats.modeQueues[key] || stats.modeQueues[key].length < 4) buildQueue(key, eligible);
      let id, guard = 0;
      do { id = stats.modeQueues[key].shift(); guard++; } while (usedIds.has(id) && guard < 80);
      saveStats();
      return QUESTION_BANK.find(q => q.id === id) || shuffleArray(eligible)[0];
    }
    function getDailyQuestions() { return shuffleArray(QUESTION_BANK, hashString(todayKey())).slice(0, 10); }
    function markQuestionSeen(id) { stats.recentQuestionIds = [id, ...stats.recentQuestionIds.filter(x => x !== id)].slice(0, 50); saveStats(); }

    // Mode setup
    function startGame(mode, level = 1, practice = false) {
      const length = mode === 'mixed' ? 15 : mode === 'endless' ? Infinity : 10;
      const used = new Set();
      let questions = [];
      if (mode === 'daily') questions = getDailyQuestions();
      else {
        const count = length === Infinity ? 1 : length;
        for (let i=0;i<count;i++) { const pullLevel = mode === 'level' ? level : mode === 'endless' ? 1 : undefined; const q = getNextQuestion(mode, pullLevel, used); used.add(q.id); questions.push(q); }
      }
      game = { mode, level, practice, length, questions, index:0, current:null, score:0, correct:0, wrong:0, streak:0,bestStreak:0,misses:0,results:[],missed:[],hinted:false,answered:false };
      renderQuestion();
    }
    function endlessLevel() { return Math.min(5, 1 + Math.floor(game.correct / 5)); }

    // Rendering
    function renderMenu() {
      updateUnlocks(false);
      app.innerHTML = `<section class="panel"><div class="brand"><div class="cross">✦</div><h1>Amen or Not</h1><p class="sub">Is it Scripture, almost Scripture, or not Scripture?</p></div><div class="grid menu"><button class="btn primary" onclick="startDaily()">Daily Discernment<small>Same 10 questions for everyone today</small></button><button class="btn" onclick="startGame('endless')">Endless Mode<small>Miss 3 and the run ends</small></button><button class="btn" onclick="renderLevelMenu()">Level Run<small>Choose Milk through Berean</small></button><button class="btn" ${stats.levelUnlocked < 3 ? 'disabled' : ''} onclick="startGame('mixed')">${stats.levelUnlocked < 3 ? '🔒 ' : ''}Mixed Challenge<small>Unlocks after Level 3</small></button><button class="btn" ${!canPlayAlmost() ? 'disabled' : ''} onclick="startGame('almost')">${!canPlayAlmost() ? '🔒 ' : ''}Almost Only<small>Hard mode for close misquotes</small></button><button class="btn" onclick="renderStats()">Stats<small>Your saved progress</small></button></div><p class="kbd">Keyboard: 1 Amen · 2 Almost · 3 Not · H Hint · Enter Next · Esc Menu</p></section>`;
    }
    function startDaily() { const done = stats.dailyHistory[todayKey()]; if (done) { toast('Daily already counted. Practice replay opened.'); startGame('daily',1,true); } else startGame('daily'); }
    function renderLevelMenu() { app.innerHTML = `<section class="panel"><h2>Choose a Level</h2><div class="grid">${[1,2,3,4,5].map(l => `<button class="btn" ${stats.levelUnlocked < l ? 'disabled' : ''} onclick="startGame('level',${l})">${stats.levelUnlocked < l ? '🔒 ' : ''}Level ${l}: ${LEVELS[l]}<small>${l === 1 ? 'Available now' : 'Unlocks at ' + LEVEL_REQUIREMENTS[l] + ' total correct answers'}</small></button>`).join('')}</div><br><button class="btn" onclick="renderMenu()">Back</button></section>`; }
    function modeName() { return {daily:'Daily Discernment',endless:'Endless Mode',level:`Level ${game.level}: ${LEVELS[game.level]}`,mixed:'Mixed Challenge',almost:'Almost Only'}[game.mode]; }
    function quitToMenu() { if (!game || game.answered || confirm('Quit this round and return to the main screen?')) { game = null; renderMenu(); } }
    function renderQuestion() {
      if (game.mode === 'endless' && !game.questions[game.index]) { const q = getNextQuestion('endless', endlessLevel(), new Set(game.results.map(r => r.id))); game.questions[game.index] = q; }
      const q = game.questions[game.index]; game.current = q; game.answered = false; game.hinted = false; markQuestionSeen(q.id);
      const progress = game.length === Infinity ? `Correct ${game.correct}` : `${game.index + 1}/${game.length}`;
      app.innerHTML = `<section class="panel"><div class="top"><span class="pill">${modeName()} · ${progress} · ${LEVELS[q.level]}</span><div class="statsrow"><span class="pill">Score ${game.score.toLocaleString()}</span><span class="pill">Streak ${game.streak}</span>${game.mode === 'endless' ? `<span class="pill">${'🕯️'.repeat(3-game.misses)}${'·'.repeat(game.misses)}</span>` : ''}<button class="btn quitBtn" onclick="quitToMenu()">Quit</button></div></div><div class="quote"><div class="quoteText">“${escapeHtml(q.phrase)}”</div></div><div class="hint" id="hint"></div><button class="btn hintButton" onclick="useHint()">Hint <small>H · removes no-hint bonus</small></button><div class="choices">${ANSWERS.map((a,i) => `<button class="btn choice ${a.toLowerCase()}" data-answer="${a}" onclick="answerQuestion('${a}')">${i+1}. ${a}<span>${a === 'AMEN' ? 'It’s Scripture' : a === 'ALMOST' ? 'Close, but off' : 'Not Scripture'}</span></button>`).join('')}</div>${progressDots()}<div id="reveal"></div></section>`;
    }
    function progressDots() { if (game.length === Infinity) return ''; return `<div class="dots">${Array.from({length:game.length},(_,i)=>`<i class="dot ${game.results[i]?.correct ? (game.results[i].hinted ? 'hinted' : 'good') : game.results[i] ? 'bad' : ''}"></i>`).join('')}</div>`; }

    // Answer handling / scoring
    function useHint() { if (!game || game.answered) return; game.hinted = true; $('#hint').textContent = '✦ ' + game.current.hint; }
    function answerQuestion(choice) {
      if (!game || game.answered) return;
      game.answered = true;
      const q = game.current;
      const correct = choice === q.answer;
      let gained = 0;
      if (correct) { game.streak++; game.correct++; gained = 100 + ((q.level - 1) * 25) + (game.streak * 10) + (game.hinted ? 0 : 25); game.score += gained; game.bestStreak = Math.max(game.bestStreak, game.streak); if (game.streak % 5 === 0) toast(`Streak x${game.streak}`); }
      else { game.streak = 0; game.wrong++; game.misses++; game.missed.push({q, chosen:choice}); }
      game.results.push({id:q.id, correct, hinted:game.hinted, chosen:choice});
      document.querySelectorAll('.choice').forEach(btn => { btn.disabled = true; if (btn.dataset.answer === q.answer) btn.classList.add('correct'); if (btn.dataset.answer === choice && !correct) btn.classList.add('wrong'); });
      $('#reveal').innerHTML = `<div class="reveal"><h3>${correct ? 'Correct' : 'Not quite'} <span class="answerTag">${q.answer}</span></h3>${q.reference ? `<p><b>Verse:</b> ${q.reference}</p>` : '<p><b>100% not a Bible verse</b></p>'}${q.actual ? `<div class="actual"><b>Verse wording:</b><br>“${escapeHtml(q.actual)}”</div>` : ''}<p>${escapeHtml(q.explanation)}</p><p><b>Source type:</b> ${q.sourceType} · <b>+${gained}</b></p><button class="btn primary" onclick="nextQuestion()">Next</button></div>`;
      scorePop(`+${gained}`);
      const nextButton = document.querySelector('#reveal .primary');
      if (nextButton && nextButton.focus) nextButton.focus({preventScroll:true});
    }
    function nextQuestion() {
      game.index++; game.hinted = false; game.answered = false;
      if (game.mode === 'endless') { if (game.misses >= 3) return endGame(); game.questions[game.index] = getNextQuestion('endless', endlessLevel(), new Set(game.results.map(r => r.id))); return renderQuestion(); }
      if (game.index >= game.length) return endGame();
      renderQuestion();
    }

    // Progression / unlocks / stats
    function endGame() {
      const shouldCount = !(game.mode === 'daily' && game.practice);
      if (shouldCount) {
        stats.totalGamesPlayed++; stats.totalQuestionsSeen += game.results.length; stats.totalCorrect += game.correct; stats.totalWrong += game.wrong; stats.bestStreak = Math.max(stats.bestStreak, game.bestStreak); stats.totalScore += game.score; if (game.wrong === 0) stats.perfectRounds++;
        if (game.mode === 'endless') stats.highestEndlessScore = Math.max(stats.highestEndlessScore, game.score);
        const modeStats = stats.modeStats[game.mode] || (stats.modeStats[game.mode] = {played:0,bestScore:0}); modeStats.played++; modeStats.bestScore = Math.max(modeStats.bestScore, game.score);
        for (const r of game.results) { const q = QUESTION_BANK.find(x => x.id === r.id); stats.answeredQuestionIds.push(q.id); if (!r.correct) stats.missedQuestionIds.push(q.id); const cs = stats.categoryStats[q.category] || (stats.categoryStats[q.category] = {seen:0,correct:0}); cs.seen++; if (r.correct) cs.correct++; }
        if (game.mode === 'daily') { const d = todayKey(); const y = new Date(); y.setDate(y.getDate()-1); const yd = y.toLocaleDateString('en-CA'); stats.dailyHistory[d] = {score:game.score,correct:game.correct,rank:getRank()}; stats.dailyStreak = stats.lastDailyDate === yd ? stats.dailyStreak + 1 : 1; stats.lastDailyDate = d; stats.bestDailyStreak = Math.max(stats.bestDailyStreak, stats.dailyStreak); }
      }
      updateUnlocks(true); saveStats(); renderEndScreen();
    }
    function updateUnlocks(showToast) { const old = stats.levelUnlocked; while (stats.levelUnlocked < 5 && stats.totalCorrect >= LEVEL_REQUIREMENTS[stats.levelUnlocked + 1]) stats.levelUnlocked++; const almostSeen = stats.answeredQuestionIds.map(id => QUESTION_BANK.find(q => q.id === id)).filter(q => q && q.answer === 'ALMOST').length; stats.unlockedModes.mixed = stats.levelUnlocked >= 3; stats.unlockedModes.almost = stats.levelUnlocked >= 3 || almostSeen >= 25; if (showToast && stats.levelUnlocked > old) toast('Level unlocked: ' + LEVELS[stats.levelUnlocked]); }
    function canPlayAlmost() { return stats.unlockedModes.almost || stats.levelUnlocked >= 3; }
    function getRank() { const accuracy = game.correct / Math.max(1, game.results.length); const index = Math.min(7, Math.floor(accuracy * 5) + Math.floor(game.score / 1400)); return ['Seeker','Student','Steady','Watchful','Rooted','Discernment','Berean','Overcomer'][index]; }
    function renderEndScreen() { const accuracy = Math.round((game.correct / game.results.length) * 100); const rank = getRank(); if (game.wrong === 0) sparkle(); app.innerHTML = `<section class="panel"><h2>${modeName()} Complete</h2><div class="cards"><div class="card"><small>Score</small><h2>${game.score.toLocaleString()}</h2></div><div class="card"><small>Rank</small><h2>${rank}</h2></div><div class="card"><small>Correct</small><h2>${game.correct}/${game.results.length}</h2></div><div class="card"><small>Accuracy</small><h2>${accuracy}%</h2></div><div class="card"><small>Best Streak</small><h2>${game.bestStreak}</h2></div><div class="card"><small>Missed</small><h2>${game.wrong}</h2></div></div><p>“You checked what was said against the Word.”</p><div class="grid"><button class="btn primary" onclick="shareResult()">Share Result</button>${game.missed.length ? '<button class="btn" onclick="renderReview()">Review Missed</button>' : ''}<button class="btn" onclick="startGame(game.mode, game.level, true)">Play Again</button><button class="btn" onclick="renderMenu()">Back to Menu</button></div></section>`; }
    function renderStats() { const total = Math.max(1, stats.totalQuestionsSeen); const accuracy = Math.round(stats.totalCorrect / total * 100); const cats = Object.entries(stats.categoryStats).sort((a,b)=>(b[1].correct/b[1].seen)-(a[1].correct/a[1].seen)); app.innerHTML = `<section class="panel"><h2>Stats</h2><div class="cards">${[['Games played',stats.totalGamesPlayed],['Total questions',stats.totalQuestionsSeen],['Accuracy',accuracy+'%'],['Best streak',stats.bestStreak],['Daily streak',stats.dailyStreak],['Best daily streak',stats.bestDailyStreak],['Highest endless',stats.highestEndlessScore.toLocaleString()],['Perfect rounds',stats.perfectRounds],['Unlocked level',LEVELS[stats.levelUnlocked]],['Total score',stats.totalScore.toLocaleString()]].map(([k,v])=>`<div class="card"><small>${k}</small><h2>${v}</h2></div>`).join('')}</div><p><b>Strongest category:</b> ${cats[0]?.[0] || '—'}<br><b>Weakest category:</b> ${cats.at(-1)?.[0] || '—'}</p><div class="bar"><i style="width:${accuracy}%"></i></div><br><button class="btn" onclick="renderMenu()">Back</button></section>`; }

    // Share / review
    function shareResult() { const grid = game.results.map(r => r.correct ? (r.hinted ? '🟨' : '🟩') : '🟥').join(''); const text = game.mode === 'endless' ? `Amen or Not — Endless
Score: ${game.score.toLocaleString()}
Correct: ${game.correct}
Best Streak: ${game.bestStreak}
Rank: ${getRank()}` : `Amen or Not ${game.mode === 'daily' ? '#' + (hashString(todayKey()) % 1000) : '— ' + modeName()}
Score: ${game.correct}/${game.results.length}
Rank: ${getRank()}
Streak: ${game.bestStreak}
${grid}

🟩 correct · 🟥 wrong · 🟨 correct with hint`; if (navigator.clipboard) navigator.clipboard.writeText(text).then(()=>toast('Result copied')).catch(()=>copyFallback(text)); else copyFallback(text); }
    function copyFallback(text) { prompt('Copy your result:', text); toast('Result ready'); }
    function renderReview() { app.innerHTML = `<section class="panel"><h2>Review Missed</h2>${game.missed.map(m => `<div class="reviewItem"><h3>“${escapeHtml(m.q.phrase)}”</h3><p>Your answer: <b>${m.chosen}</b> · Correct answer: <b>${m.q.answer}</b></p>${m.q.reference ? `<p><b>Verse:</b> ${m.q.reference}</p>` : '<p><b>100% not a Bible verse</b></p>'}${m.q.actual ? `<div class="actual"><b>Verse wording:</b><br>“${escapeHtml(m.q.actual)}”</div>` : ''}<p>${escapeHtml(m.q.explanation)}</p></div>`).join('')}<button class="btn" onclick="renderEndScreen()">Back</button></section>`; }

    // UI helpers / toasts / animations
    function escapeHtml(text) { return String(text).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
    function toast(message) { const el = $('#toast'); el.textContent = message; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'), 1800); }
    function scorePop(message) { const el = document.createElement('div'); el.className = 'toast show'; el.textContent = message; document.body.appendChild(el); setTimeout(()=>el.remove(), 760); }
    function sparkle() { const el = document.createElement('div'); el.className = 'sparkle'; document.body.appendChild(el); setTimeout(()=>el.remove(), 900); }
    window.addEventListener('keydown', (event) => { if (event.key === 'Escape') return renderMenu(); if (!game) return; if (['1','2','3'].includes(event.key)) answerQuestion(ANSWERS[Number(event.key)-1]); if (event.key.toLowerCase() === 'h') useHint(); if (event.key === 'Enter' && game.answered) nextQuestion(); });
    renderMenu();
  </script>
</body>
</html>
