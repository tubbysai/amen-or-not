*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#081225;color:#f8efd9;font-family:Georgia,'Times New Roman',serif}body{overflow-x:hidden;background:radial-gradient(circle at 50% -10%,rgba(216,173,79,.28),transparent 34rem),radial-gradient(circle at 12% 25%,rgba(67,96,153,.22),transparent 26rem),linear-gradient(135deg,#060c19,#0c1830 55%,#07101f)}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(30deg,transparent 47%,rgba(216,173,79,.06) 48%,rgba(216,173,79,.06) 52%,transparent 53%),linear-gradient(150deg,transparent 47%,rgba(255,255,255,.035) 48%,rgba(255,255,255,.035) 52%,transparent 53%);background-size:140px 140px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}button{font:inherit}.app{width:min(100%,760px);margin:0 auto;padding:clamp(14px,3vw,34px);min-height:100svh;display:flex;align-items:center}.shell{width:100%;position:relative}.panel{background:linear-gradient(180deg,rgba(16,27,52,.9),rgba(8,18,37,.92));border:1px solid var(--line);border-radius:32px;padding:clamp(18px,4vw,34px);box-shadow:var(--shadow);backdrop-filter:blur(18px);animation:rise .35s ease}.brand{text-align:center;margin-bottom:22px}.cross{color:var(--gold);font-size:32px;text-shadow:0 0 22px rgba(216,173,79,.55)}h1{font-size:clamp(42px,8vw,72px);line-height:.9;margin:8px 0;background:linear-gradient(#fff6dc,#c9932e);-webkit-background-clip:text;color:transparent;letter-spacing:-2px}h2{margin:0 0 12px;font-size:clamp(26px,5vw,40px)}p{color:#cbd5e1;line-height:1.55}.sub{font-size:clamp(16px,2.5vw,20px);margin:0;color:#d9c99d}.grid{display:grid;gap:12px}.menu{grid-template-columns:repeat(2,minmax(0,1fr))}.btn{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.035));color:#fff2d6;border-radius:18px;padding:15px 18px;cursor:pointer;min-height:58px;transition:.18s;box-shadow:inset 0 1px rgba(255,255,255,.12)}.btn:hover:not(:disabled){transform:translateY(-2px ag{display:inline-block;color:#061122;background:var(--gold);border-radius:999px;padding:7px 12px;font-weight:bold}.actual{background:rgba(244,234,214,.1);border-left:3px solid var(--gold);padding:12px;border-radius:10px;color:#fff4d7}.dots{display:flex;gap:6px;justify-content:center;margin:14px 0}.dot{width:10px;height:10px;border-radius:50%;background:#33415e}.dot.good{background:var(--green)}.dot.bad{background:var(--red)}.dot.hintdot{background:var(--amber)}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card{border:1px solid var(--line);border-radius:20px;padding:16px;background:rgba(255,255,255,.06)}.bar{height:8px;background:#23304b;border-radius:9px;overflow:hidden}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#fff0a7);border-radius:9px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:#fff2cf;color:#0b1428;border:1px solid #e9c66b;border-radius:999px;padding:12px 18px;box-shadow:var(--shadow);transition:.25s;z-index:20;font-weight:bold}.toast.show{opacity:1;transform:translateX(-50%)}.sparkle{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,#ffe28a 0 2px,transparent 3px);background-size:45px 45px;animation:spark .8s ease forwards}.reviewItem{border-top:1px solid var(--line);padding:14px 0}.kbd{font-family:system-ui,sans-serif;color:#93a4c2;font-size:12px;text-align:center;margin-top:14px}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1}}@keyframes slide{from{opacity:0;transform:translateY(-8px)}to{opacity:1}}@keyframes pulse{50%{transform:scale(1.025)}}@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}@keyframes spark{to{opacity:0;transform:scale(1.08)}}@media(max-width:620px){.app{align-items:flex-start;padding:12px}.panel{border-radius:24px;padding:16px}.menu,.cards{grid-template-columns:1fr}.choices{grid-template-columns:1fr;position:sticky;bottom:8px;z-index:2}.choice{min-height:66px;display:flex;justify-content:space-between;align-items:center}.quoteText{font-size:30px}.top{align-items:flex-start;flex-direction:column}.btn:hover{transform:none}}

<script>
/* Constants */
const LEVELS={1:'Milk',2:'Bread',3:'Meat',4:'Discernment',5:'Berean'},ANS=['AMEN','ALMOST','NOT'],STORE='amenOrNot.v1';
const REQ={2:10,3:30,4:60,5:100};
/* Question bank */
const seeds={
1:[['God helps those who help themselves.','NOT','','','This is a cultural saying. 100% not a Bible verse.','Cultural Saying'],['Cleanliness is next to godliness.','NOT','','','This popular phrase is 100% not a Bible verse.','Cultural Saying'],['The truth will set you free.','AMEN','John 8:32','The truth will set you free.','Jesus speaks of truth and discipleship.','Words of Jesus'],['Iron sharpens iron.','AMEN','Proverbs 27:17','Iron sharpens iron, and one man sharpens another.','A recognizable proverb about mutual sharpening.','Proverbs'],['Love your neighbor as yourself.','AMEN','Mark 12:31','You shall love your neighbor as yourself.','Jesus names this as a great commandment.','Words of Jesus'],['A soft answer turns away wrath.','AMEN','Proverbs 15:1','A soft answer turns away wrath.','This is biblical wisdom from Proverbs.','Proverbs'],['The Lord is my shepherd.','AMEN','Psalm 23:1','The Lord is my shepherd; I shall not want.','A famous line from Psalm 23.','Psalms'],['Rejoice always.','AMEN','1 Thessalonians 5:16','Rejoice always.','A brief command from Paul.','Paul’s Letters'],['Pray without ceasing.','AMEN','1 Thessalonians 5:17','Pray without ceasing.','A short New Testament command.','Paul’s Letters'],['Money is the root of all evil.','ALMOST','1 Timothy 6:10','The love of money is a root of all kinds of evil.','Scripture warns about love of money, not money itself.','Misquote']],
2:[['This too shall pass.','NOT','','','A wise saying, but 100% not a Bible verse.','Cultural Saying'],['Hate the sin, love the sinner.','NOT','','','Religious-sounding, but not a Bible verse.','Popular Phrase'],['Pride comes before the fall.','ALMOST','Proverbs 16:18','Pride goes before destruction, and a haughty spirit before a fall.','The common version compresses the wording.','Misquote'],['The lion shall lie down with the lamb.','ALMOST','Isaiah 11:6','The wolf shall dwell with the lamb.','The common wording changes the animals.','Misquote'],['God will never give you more than you can handle.','ALMOST','1 Corinthians 10:13','God provides a way of escape from temptation.','The verse is about temptation, not every hardship.','Misleading Paraphrase'],['Spare the rod, spoil the child.','ALMOST','Proverbs 13:24','Whoever spares the rod hates his son.','The familiar proverb is not the exact biblical wording.','Misquote'],['The truth shall set you free.','ALMOST','John 8:32','The truth will set you free.','One word is different from the recognizable wording.','Misquote'],['In the beginning God created the heavens and the earth.','AMEN','Genesis 1:1','In the beginning, God created the heavens and the earth.','The opening line of Genesis.','Torah'],['The wages of sin is death.','AMEN','Romans 6:23','For the wages of sin is death.','A recognizable line from Romans.','Paul’s Letters'],['The gift of God is eternal life.','AMEN','Romans 6:23','The free gift of God is eternal life in Christ Jesus our Lord.','This completes the contrast in Romans 6:23.','Paul’s Letters']],
3:[['Follow your heart.','NOT','','','This is popular advice, but 100% not a Bible verse.','Cultural Saying'],['Charity begins at home.','NOT','','','A common proverb, not Scripture.','Cultural Saying'],['Do unto others as you would have them do unto you.','ALMOST','Matthew 7:12','Whatever you wish that others would do to you, do also to them.','The idea is biblical; the exact phrase is traditional wording.','Paraphrase'],['Eye for an eye, tooth for a tooth.','ALMOST','Exodus 21:24','Eye for eye, tooth for tooth.','It reflects biblical law but is often quoted incompletely.','Incomplete Quote'],['The love of money is the root of all evil.','ALMOST','1 Timothy 6:10','The love of money is a root of all kinds of evil.','It says a root of all kinds, not the root of all.','Misquote'],['Judge not.','ALMOST','Matthew 7:1','Judge not, that you be not judged.','The shortened form can miss the warning against hypocritical judgment.','Incomplete Quote'],['Faith without works is dead.','AMEN','James 2:26','Faith apart from works is dead.','A recognizable teaching from James.','General Epistles'],['We walk by faith, not by sight.','AMEN','2 Corinthians 5:7','We walk by faith, not by sight.','A direct line from Paul.','Paul’s Letters'],['The just shall live by faith.','AMEN','Romans 1:17','The righteous shall live by faith.','A central biblical phrase also echoed in Habakkuk.','Paul’s Letters'],['To obey is better than sacrifice.','AMEN','1 Samuel 15:22','To obey is better than sacrifice.','Samuel rebukes Saul with this line.','History']],
4:[['Moderation in all things.','NOT','','','This ancient maxim is 100% not a Bible verse.','Cultural Saying'],['The Lord works in mysterious ways.','NOT','','','Religious-sounding, but not biblical wording.','Popular Phrase'],['When God closes a door, He opens a window.','NOT','','','A popular encouragement, 100% not a Bible verse.','Popular Phrase'],['God moves in mysterious ways.','NOT','','','From a hymn tradition, not a Bible verse.','Popular Phrase'],['Be still, and know that I am God.','AMEN','Psalm 46:10','Be still, and know that I am God.','A direct line from Psalm 46.','Psalms'],['I can do all things through Christ who strengthens me.','AMEN','Philippians 4:13','I can do all things through him who strengthens me.','Paul speaks of contentment through Christ.','Paul’s Letters'],['Be sure your sin will find you out.','AMEN','Numbers 32:23','Be sure your sin will find you out.','A warning from Numbers.','Torah'],['The race is not to the swift.','AMEN','Ecclesiastes 9:11','The race is not to the swift.','Ecclesiastes observes life’s unpredictability.','Wisdom'],['The borrower is slave to the lender.','AMEN','Proverbs 22:7','The borrower is the slave of the lender.','A proverb about debt and dependence.','Proverbs'],['All things work together for good.','ALMOST','Romans 8:28','For those who love God all things work together for good.','The common phrase often omits the qualifying context.','Incomplete Quote']],
5:[['God needed another angel.','NOT','','','A comforting phrase some use, but 100% not a Bible verse.','Popular Phrase'],['Heaven gained an angel.','NOT','','','A sympathy phrase, not biblical teaching or a verse.','Popular Phrase'],['The eye is the window to the soul.','NOT','','','A common saying, not Scripture.','Cultural Saying'],['The patience of Job.','ALMOST','James 5:11','You have heard of the steadfastness of Job.','The idea is biblical, but the phrase is traditional wording.','Paraphrase'],['The spirit is willing but the flesh is weak.','AMEN','Matthew 26:41','The spirit indeed is willing, but the flesh is weak.','Jesus says this in Gethsemane.','Words of Jesus'],['Deep calls unto deep.','AMEN','Psalm 42:7','Deep calls to deep.','A poetic line from Psalm 42.','Psalms'],['Can two walk together, except they be agreed?','AMEN','Amos 3:3','Do two walk together, unless they have agreed to meet?','A recognizable prophetic question.','Prophets'],['Many are called, but few are chosen.','AMEN','Matthew 22:14','Many are called, but few are chosen.','A saying of Jesus.','Words of Jesus'],['God helps the weak who trust Him.','ALMOST','2 Corinthians 12:9','My grace is sufficient for you, for my power is made perfect in weakness.','The idea resembles Scripture but is not the wording.','Paraphrase'],['Where there is no vision, the people perish.','ALMOST','Proverbs 29:18','Where there is no prophetic vision the people cast off restraint.','Often used loosely; the verse concerns revelation and restraint.','Misquote']]
};
const phrases=['Blessed are the peacemakers.','The meek shall inherit the earth.','Man shall not live by bread alone.','Seek first the kingdom of God.','Do not be anxious about tomorrow.','The harvest is plentiful, but the laborers are few.','Let your light shine before others.','You are the salt of the earth.','Ask, and it will be given to you.','Knock, and it will be opened to you','The Lord loves a cheerful giver.','God is love.','Perfect love casts out fear.','Children, obey your parents in the Lord.','Put on the full armor of God.','Run with endurance the race set before us.','Encourage one another and build one another up.','Give thanks in all circumstances.','Test everything; hold fast what is good.','The fear of the Lord is the beginning of wisdom.','Trust in the Lord with all your heart.','A joyful heart is good medicine.','The name of the Lord is a strong tower.','Commit your work to the Lord.','Better is a little with righteousness.','A friend loves at all times.','There is a time for everything.','Two are better than one.','Cast your burden on the Lord.','Create in me a clean heart.'];
const almost=['God wants you happy above all else.','Everything happens for a reason.','The safest place is the center of God’s will.','If you train up a child, they will never stray.','Ask anything and God must give it.','Touch not the Lord’s anointed.','Where two or three gather, God grants their request.','No weapon formed against me can ever hurt me.','By His stripes every illness is already gone.','Without a vision, people die.'];
const nots=['The Bible says to forgive and forget.','Good things come to those who wait.','God won’t bless a mess.','Let go and let God.','Prayer changes things.','Once saved, always easy.','Be true to yourself.','God loves you just the way you are, so never change.','A penny saved is a penny earned.','Do your best and God will do the rest.'];
let QUESTIONS=[];let id=1;function add(q,l){QUESTIONS.push({id:'q'+String(id++).padStart(3,'0'),phrase:q[0],answer:q[1],level:l,category:q[5]||'Bible Knowledge',reference:q[2],actual:q[3],explanation:q[4],sourceType:q[1]=='AMEN'?'Scripture':q[1]=='ALMOST'?'Misquote':'Not Scripture',hint:q[1]=='NOT'?'This is a cultural saying, not a verse.':q[1]=='ALMOST'?'This one is Scripture-adjacent, but wording matters.':'This is recognizable biblical wording.'})}
for(let l=1;l<=5;l++){seeds[l].forEach(q=>add(q,l));for(let i=0;i<10;i++)add([phrases[(l-1)*5+i%phrases.length]||phrases[i],'AMEN','See Scripture','Recognizable biblical wording.','This is recognizable biblical language from Scripture.',['Words of Jesus','Psalms','Proverbs','Paul’s Letters','Wisdom'][i%5]],l);for(let i=0;i<5;i++)add([almost[(l*2+i)%almost.length],'ALMOST','Related biblical theme','The biblical wording is more specific than this phrase.','This is inspired by biblical ideas but changes or overstates the meaning.','Misleading Paraphrase'],l);for(let i=0;i<5;i++)add([nots[(l*2+i)%nots.length],'NOT','','','This is 100% not a Bible verse; it is a popular or religious-sounding saying.','Popular Phrase'],l)}
/* State and storage */
const $=s=>document.querySelector(s), app=$('#app');
const fresh=()=>({totalGamesPlayed:0,totalQuestionsSeen:0,totalCorrect:0,totalWrong:0,bestStreak:0,highestEndlessScore:0,dailyStreak:0,bestDailyStreak:0,lastDailyDate:'',perfectRounds:0,levelUnlocked:1,totalScore:0,answeredQuestionIds:[],missedQuestionIds:[],categoryStats:{},modeStats:{},dailyHistory:{},unlockedModes:{mixed:false,almost:false},recentQuestionIds:[],playerSeed:getRandomSeed(),modeQueues:{}});
let stats=load(), game=null;
function load(){try{return Object.assign(fresh(),JSON.parse(localStorage.getItem(STORE)||'{}'))}catch{return fresh()}}function save(){localStorage.setItem(STORE,JSON.stringify(stats))}
/* Seeded random / shuffle helpers */
function getRandomSeed(){if(crypto&&crypto.getRandomValues){let a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]}return Math.floor(Math.random()*2**32)}
function hash(s){let h=2166136261;for(let c of s)h=(h^c.charCodeAt(0))*16777619>>>0;return h}
function rng(seed){let t=seed>>>0;return()=>{t+=0x6D2B79F5;let r=Math.imul(t^t>>>15,1|t);r^=r+Math.imul(r^r>>>7,61|r);return((r^r>>>14)>>>0)/4294967296}}
function shuffle(a,seed){let r=seed===undefined?Math.random:rng(seed),x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(r()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function today(){return new Date().toLocaleDateString('en-CA')}
/* Question selection */
function eligible(mode,level){let q=QUESTIONS.filter(x=>!level||x.level==level);if(mode=='mixed')q=q.filter(x=>x.level<=stats.levelUnlocked);if(mode=='almost')q=q.filter(x=>x.answer=='ALMOST'&&x.level<=stats.levelUnlocked);return q}
function queueKey(mode,level){return mode+(level?'-'+level:'')}
function buildQueue(key,qs){let recent=new Set(stats.recentQuestionIds), pool=qs.filter(q=>!recent.has(q.id));if(pool.length<10)pool=qs;stats.modeQueues[key]=shuffle(pool.map(q=>q.id),hash(key+stats.playerSeed+Date.now()));save()}
function nextQ(mode,level,used=new Set()){let qs=eligible(mode,level).filter(q=>!used.has(q.id)), key=queueKey(mode,level);if(!stats.modeQueues[key]||stats.modeQueues[key].length<3)buildQueue(key,qs);let idv, guard=0;do{idv=stats.modeQueues[key].shift();guard++}while(used.has(idv)&&guard<50);save();return QUESTIONS.find(q=>q.id==idv)||shuffle(qs)[0]}
function dailySet(){return shuffle(QUESTIONS,hash(today())).slice(0,10)}
function markSeen(q){stats.recentQuestionIds=[q.id,...stats.recentQuestionIds.filter(x=>x!=q.id)].slice(0,45)}
/* Mode setup */
function start(mode,level,practice=false){let len=mode=='mixed'?15:(mode=='endless'?Infinity:10), qs=[];if(mode=='daily')qs=dailySet(); else {let used=new Set();for(let i=0;i<(len==Infinity?1:len);i++){let lvl=mode=='endless'?1:level;let q=nextQ(mode,lvl,used);used.add(q.id);qs.push(q)}}game={mode,level:level||1,practice,len,qs,index:0,score:0,correct:0,wrong:0,streak:0,best:0,misses:0,results:[],missed:[],hinted:false,answered:false};renderQuestion()}
function endlessLevel(){return Math.min(5,1+Math.floor(game.correct/5))}
/* Rendering */
function renderMenu(){unlockCheck(false);app.innerHTML=`<section class="panel"><div class="brand"><div class="cross">✦</div><h1>Amen or Not</h1><p class="sub">Is it Scripture, almost Scripture, or not Scripture?</p></div><div class="grid menu"><button class="btn primary" onclick="dailyStart()">Daily Discernment<small>10-question challenge</small></button><button class="btn" onclick="start('endless')">Endless Mode<small>Miss 3 and the run ends</small></button><button class="btn" onclick="levelMenu()">Level Run<small>Choose Milk through Berean</small></button><button class="btn" ${stats.levelUnlocked<3?'disabled':''} onclick="start('mixed')">${stats.levelUnlocked<3?'🔒 ':''}Mixed Challenge<small>Unlocks at Level 3</small></button><button class="btn" ${!canAlmost()?'disabled':''} onclick="start('almost')">${!canAlmost()?'🔒 ':''}Almost Only<small>Hard mode for misquotes</small></button><button class="btn" onclick="renderStats()">Stats<small>Your saved progress</small></button></div><p class="kbd">Keyboard: 1 Amen · 2 Almost · 3 Not · H Hint · Enter Next · Esc Menu</p></section>`}
function dailyStart(){let d=today(), done=stats.dailyHistory[d]; if(done){toast('Daily already counted. Practice replay opened.'); start('daily',1,true)} else start('daily')}
function levelMenu(){app.innerHTML=`<section class="panel"><h2>Choose a Level</h2><div class="grid">${[1,2,3,4,5].map(l=>`<button class="btn" ${stats.levelUnlocked<l?'disabled':''} onclick="start('level',${l})">${stats.levelUnlocked<l?'🔒 ':''}Level ${l}: ${LEVELS[l]}<small>${l==1?'Beginner':l==5?'Deep cuts':'10-question run'} ${REQ[l]?`· unlock at ${REQ[l]} correct`:''}</small></button>`).join('')}</div><button class="btn" onclick="renderMenu()">Back</button></section>`}
function renderQuestion(){let q=game.mode=='endless'? (game.qs[game.index]||nextQ('endless',endlessLevel(),new Set(game.results.map(r=>r.id)))):game.qs[game.index];game.current=q;markSeen(q);save();let prog=game.len==Infinity?`Correct ${game.correct}`:`${game.index+1}/${game.len}`;app.innerHTML=`<section class="panel"><div class="top"><span class="pill">${nameMode()} · ${prog}</span><div class="statsrow"><span class="pill">Score ${game.score}</span><span class="pill">Streak ${game.streak}</span>${game.mode=='endless'?`<span class="pill">${'🕯️'.repeat(3-game.misses)}${'·'.repeat(game.misses)}</span>`:''}</div></div><div class="quote"><div class="quoteText">“${q.phrase}”</div></div><div class="hint" id="hint"></div><button class="btn" onclick="useHint()">Hint <small>H · removes no-hint bonus</small></button><div class="choices">${ANS.map((a,i)=>`<button class="btn choice ${a.toLowerCase()}" data-a="${a}" onclick="answer('${a}')">${i+1}. ${a}<span>${a=='AMEN'?"It’s Scripture":a=='ALMOST'?'Close, but off':'Not Scripture'}</span></button>`).join('')}</div>${dots()}<div id="reveal"></div></section>`}
function dots(){if(game.len==Infinity)return '';return `<div class="dots">${Array.from({length:game.len},(_,i)=>`<i class="dot ${(game.results[i]?.hinted&&game.results[i]?.correct)?'hintdot':game.results[i]?.correct?'good':game.results[i]?'bad':''}"></i>`).join('')}</div>`}
function nameMode(){return {daily:'Daily Discernment',endless:'Endless Mode',level:'Level '+game.level+': '+LEVELS[game.level],mixed:'Mixed Challenge',almost:'Almost Only'}[game.mode]}
/* Answer handling and scoring */
function useHint(){if(game.answered)return;game.hinted=true;$('#hint').textContent='✦ '+game.current.hint}
function answer(a){if(game.answered)return;game.answered=true;let q=game.current, ok=a==q.answer, gain=0;if(ok){game.streak++;game.correct++;gain=100+(q.level-1)*25+game.streak*10+(game.hinted?0:25);game.score+=gain;game.best=Math.max(game.best,game.streak);if(game.streak&&game.streak%5==0)toast('Streak x'+game.streak)}else{game.streak=0;game.wrong++;game.misses++;game.missed.push({q,chosen:a})}game.results.push({id:q.id,correct:ok,hinted:game.hinted,chosen:a});document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.dataset.a==q.answer)b.classList.add('correct');if(b.dataset.a==a&&!ok)b.classList.add('wrong')});$('#reveal').innerHTML=`<div class="reveal"><b>${ok?'Correct':'Not quite'}</b> <span class="answerTag">${q.answer}</span> ${q.reference?`<p><b>${q.reference}</b></p>`:'<p><b>100% not a Bible verse</b></p>'}${q.actual?`<div class="actual"><b>Actual wording:</b><br>“${q.actual}”</div>`:''}<p>${q.explanation}</p><p><b>Source type:</b> ${q.sourceType} · <b>+${gain}</b></p><button class="btn primary" onclick="next()">Next</button></div>`;pop('+'+gain);}
function pop(t){let e=document.createElement('div');e.className='toast show';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),700)}
function next(){game.index++;game.hinted=false;game.answered=false;if(game.mode=='endless'){if(game.misses>=3)return endGame();game.qs[game.index]=nextQ('endless',endlessLevel(),new Set(game.results.map(r=>r.id)));return renderQuestion()}if(game.index>=game.len)return endGame();renderQuestion()}
/* Progression / stats */
function endGame(){let counted=!(game.mode=='daily'&&game.practice);if(counted){stats.totalGamesPlayed++;stats.totalQuestionsSeen+=game.results.length;stats.totalCorrect+=game.correct;stats.totalWrong+=game.wrong;stats.bestStreak=Math.max(stats.bestStreak,game.best);stats.totalScore+=game.score;if(game.wrong==0)stats.perfectRounds++;if(game.mode=='endless')stats.highestEndlessScore=Math.max(stats.highestEndlessScore,game.score);for(let r of game.results){let q=QUESTIONS.find(x=>x.id==r.id);stats.answeredQuestionIds.push(q.id);if(!r.correct)stats.missedQuestionIds.push(q.id);let cs=stats.categoryStats[q.category]||(stats.categoryStats[q.category]={seen:0,correct:0});cs.seen++;if(r.correct)cs.correct++;}if(game.mode=='daily'){let d=today();stats.dailyHistory[d]={score:game.score,correct:game.correct,rank:rank()};let y=new Date();y.setDate(y.getDate()-1);let yd=y.toLocaleDateString('en-CA');stats.dailyStreak=stats.lastDailyDate==yd?stats.dailyStreak+1:1;stats.lastDailyDate=d;stats.bestDailyStreak=Math.max(stats.bestDailyStreak,stats.dailyStreak)}}unlockCheck(true);save();renderEnd()}
function unlockCheck(show){let old=stats.levelUnlocked;while(stats.levelUnlocked<5&&stats.totalCorrect>=REQ[stats.levelUnlocked+1])stats.levelUnlocked++;stats.unlockedModes.mixed=stats.levelUnlocked>=3;let almostSeen=stats.answeredQuestionIds.map(id=>QUESTIONS.find(q=>q.id==id)).filter(q=>q&&q.answer=='ALMOST').length;stats.unlockedModes.almost=stats.levelUnlocked>=3||almostSeen>=25;if(show&&stats.levelUnlocked>old)toast('Level unlocked: '+LEVELS[stats.levelUnlocked])}
function canAlmost(){return stats.unlockedModes.almost||stats.levelUnlocked>=3}
function rank(){let a=game.correct/game.results.length,s=game.score;return ['Seeker','Student','Steady','Watchful','Rooted','Discernment','Berean','Overcomer'][Math.min(7,Math.floor(a*5)+Math.floor(s/1200))]}
function renderEnd(){let acc=Math.round(100*game.correct/game.results.length), r=rank();if(game.wrong==0){let sp=document.createElement('div');sp.className='sparkle';document.body.appendChild(sp);setTimeout(()=>sp.remove(),900)}app.innerHTML=`<section class="panel"><h2>${nameMode()} Complete</h2><div class="cards"><div class="card"><b>Score</b><h2>${game.score.toLocaleString()}</h2></div><div class="card"><b>Rank</b><h2>${r}</h2></div><div class="card">Correct<br><b>${game.correct}/${game.results.length}</b></div><div class="card">Accuracy<br><b>${acc}%</b></div><div class="card">Best Streak<br><b>${game.best}</b></div><div class="card">Missed<br><b>${game.wrong}</b></div></div><p>“You checked what was said against the Word.”</p><div class="grid"><button class="btn primary" onclick="share()">Share Result</button>${game.missed.length?'<button class="btn" onclick="review()">Review Missed</button>':''}<button class="btn" onclick="start(game.mode,game.level,true)">Play Again</button><button class="btn" onclick="renderMenu()">Back to Menu</button></div></section>`}
/* Stats / share / review */
function renderStats(){let total=stats.totalQuestionsSeen||1, acc=Math.round(stats.totalCorrect/total*100), cats=Object.entries(stats.categoryStats), sorted=cats.sort((a,b)=>(b[1].correct/b[1].seen)-(a[1].correct/a[1].seen));app.innerHTML=`<section class="panel"><h2>Stats</h2><div class="cards">${[['Games played',stats.totalGamesPlayed],['Total questions',stats.totalQuestionsSeen],['Accuracy',acc+'%'],['Best streak',stats.bestStreak],['Daily streak',stats.dailyStreak],['Best daily',stats.bestDailyStreak],['Highest endless',stats.highestEndlessScore],['Perfect rounds',stats.perfectRounds],['Unlocked level',LEVELS[stats.levelUnlocked]],['Total score',stats.totalScore]].map(x=>`<div class="card"><small>${x[0]}</small><h2>${x[1]}</h2></div>`).join('')}</div><p><b>Strongest:</b> ${sorted[0]?.[0]||'—'} · <b>Weakest:</b> ${sorted.at(-1)?.[0]||'—'}</p><div class="bar"><i style="width:${acc}%"></i></div><br><button class="btn" onclick="renderMenu()">Back</button></section>`}
function share(){let grid=game.results.map(r=>r.correct?(r.hinted?'🟨':'🟩'):'🟥').join('');let txt=game.mode=='endless'?`Amen or Not — Endless\nScore: ${game.score}\nCorrect: ${game.correct}\nBest Streak: ${game.best}\nRank: ${rank()}`:`Amen or Not ${game.mode=='daily'?'#'+Math.floor(hash(today())%1000):'— '+nameMode()}\nScore: ${game.correct}/${game.results.length}\nRank: ${rank()}\nStreak: ${game.best}\n${grid}\n\n🟩 correct · 🟥 wrong · 🟨 correct with hint`;if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('Result copied')).catch(()=>fallback(txt));else fallback(txt)}
function fallback(t){prompt('Copy your result:',t);toast('Result ready')}
function review(){app.innerHTML=`<section class="panel"><h2>Review Missed</h2>${game.missed.map(m=>`<div class="reviewItem"><b>“${m.q.phrase}”</b><p>Your answer: ${m.chosen} · Correct: ${m.q.answer}</p>${m.q.reference?`<p><b>${m.q.reference}</b></p>`:''}${m.q.actual?`<div class="actual">“${m.q.actual}”</div>`:''}<p>${m.q.explanation}</p></div>`).join('')}<button class="btn" onclick="renderEnd()">Back</button></section>`}
function toast(t){let el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
window.addEventListener('keydown',e=>{if(!game&&e.key=='Escape')return;if(e.key=='Escape')renderMenu();if(!game)return;if(['1','2','3'].includes(e.key))answer(ANS[+e.key-1]);if(e.key.toLowerCase()=='h')useHint();if(e.key=='Enter'&&game.answered)next()});
renderMenu();
</script></body></html>
